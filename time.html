<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME</title>
    <link href="./css/time.css" rel="stylesheet">
</head>

<body>
    <div id="time_boxframe" class="boxframe">
        <div id="timeshelf">
            <div id="clock_time">
                <div id="clock_header">It's</div>
                <div id="clock_hours">00:00</div>
                <div id="clock_seconds">00</div>
            </div>
            <div id="calendar_weekday">Weekday</div>
            <div id="year_progress">day 0 of the year</div>
        </div>
        <div id="calendar_box">
            <div id="calendar_header">
                <span id="calendar_month">MONTH</span>
                <span id="calendar_year">YEAR</span>
            </div>
            <div id="calendar_weekdays">
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>
                <span>Sun</span>
            </div>
            <div id="calendar_days"></div>
        </div>
    </div>
    <script src="./js/time.js"></script>
</body>

</html>
